name: Build

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install PyInstaller

      - name: Install UPX (Windows only)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          curl.exe -sL https://github.com/upx/upx/releases/download/v5.0.0/upx-5.0.0-win64.zip -o upx.zip
          Expand-Archive -Path upx.zip -DestinationPath .
          $upxDir = Join-Path (Get-Location) "upx-5.0.0-win64"
          echo "$upxDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:Path = "$upxDir;$env:Path"

      - name: Build executable
        run: python scripts/build.py

      - name: Rename for release
        shell: bash
        run: |
          platform=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          ext=""
          [ "${{ runner.os }}" = "Windows" ] && ext=".exe"
          mv "riddle${ext}" "riddle-${{ github.run_id }}-${platform}${ext}"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ runner.os }}
          path: riddle-*

  release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Create Release and Upload
        run: |
          gh release create "riddle-${{ github.run_id }}" \
            --title "Standalone Riddle Binaries ${{ github.run_id }}" \
            --notes "Standalone Riddle binaries for various operating systems built with love by GitHub Actions ❤️" \
            2>/dev/null || true
          gh release upload "riddle-${{ github.run_id }}" riddle-* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
