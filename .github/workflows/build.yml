name: Build

on:
  push:
    branches: [main]

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install PyInstaller

      - name: Install UPX
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)  sudo apt-get install -y upx ;;
            macOS)  brew install upx ;;
            Windows)
              curl -sL https://github.com/upx/upx/releases/download/v5.0.0/upx-5.0.0-win64.zip -o upx.zip
              unzip -q upx.zip
              echo "$PWD/upx-5.0.0-win64" >> "$GITHUB_PATH"
              ;;
          esac

      - name: Build executable
        run: python scripts/build.py

      - name: Rename for release
        run: python -c "import os,shutil; platform='${{ runner.os }}'.lower(); ext='.exe' if os.name=='nt' else ''; run_id='${{ github.run_id }}'; shutil.move(f'riddle{ext}', f'riddle-{run_id}-{platform}{ext}')"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: riddle-${{ github.run_id }}
          name: Standalone Riddle Binaries ${{ github.run_id }}
          target_commitish: ${{ github.sha }}
          files: riddle-*
          fail_on_unmatched_files: false
          body: Standalone Riddle binaries for various operating systems built with love by GitHub Actions ❤️
